<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciliação de Recebíveis</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_simple.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .tabulator { border: none; background-color: white; font-size: 0.85rem; border-radius: 0.5rem;}
        .tabulator-header { border-bottom: 2px solid #e5e7eb !important; background-color: #f8fafc !important; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; }
        .tabulator-row { border-bottom: 1px solid #f1f5f9; min-height: 40px; }
        .tabulator-row:hover { background-color: #f0fdf4 !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .drop-active { border-color: #4f46e5 !important; background-color: #eef2ff !important; }
    </style>
</head>
<body class="h-full text-gray-900 flex flex-col overflow-hidden">

    <header class="bg-white border-b h-14 flex items-center justify-between px-6 shadow-sm z-30 shrink-0">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-500 hover:text-indigo-600 flex items-center gap-1.5 font-semibold text-xs transition-colors py-2 px-3 hover:bg-gray-50 rounded-md">
                <i data-feather="arrow-left" class="w-4 h-4"></i> MENU PRINCIPAL
            </a>
            <div class="h-6 w-px bg-gray-200"></div>
            <h1 class="text-base font-bold text-gray-800 flex items-center gap-2">
                <div class="p-1.5 bg-indigo-50 rounded-md"><i data-feather="layers" class="w-4 h-4 text-indigo-600"></i></div>
                Conciliação de Recebíveis
            </h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 cursor-pointer hover:bg-gray-100 p-2 rounded-md transition-colors" onclick="abrirModalPerfil()">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">
                    <i data-feather="user" class="w-4 h-4"></i>
                </div>
                <span id="user-name" class="text-sm font-semibold text-gray-700">Carregando...</span>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 bg-gray-50">
        
        <div class="max-w-6xl mx-auto space-y-6">
            <div id="upload-zone" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div id="drop-area" class="border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 flex flex-col items-center justify-center py-10 transition-colors cursor-pointer hover:bg-indigo-50 hover:border-indigo-300">
                    <div class="p-3 bg-white rounded-full shadow-sm mb-3" id="upload-icon-container">
                        <i data-feather="upload-cloud" class="w-8 h-8 text-indigo-500"></i>
                    </div>
                    <h3 class="text-base font-bold text-gray-700" id="upload-text">Arraste seu arquivo CSV da maquininha aqui</h3>
                    <p class="text-xs text-gray-500 mt-1" id="upload-subtext">Ou clique para selecionar (Ex: conciliacao_vendas_santa-cruz.csv)</p>
                    <input type="file" id="file-input" class="hidden" accept=".csv">
                </div>
            </div>

            <div id="tabela-container" class="hidden flex flex-col items-end gap-4">
                <div class="w-full bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-5 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                        <h3 class="text-sm font-bold text-gray-700 flex items-center gap-2 uppercase tracking-wide">
                            <i data-feather="check-square" class="w-4 h-4 text-green-600"></i>
                            Resultado do Cruzamento (Maquininha x ERP)
                        </h3>
                        <span class="text-xs text-gray-500 font-medium">Dica: Clique na coluna "Obs" para justificar divergências</span>
                    </div>
                    
                    <div id="tabela-conciliacao" class="w-full"></div>
                </div>
                
                <button onclick="salvarFechamentoFinal()" class="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-md hover:bg-indigo-700 shadow-md flex items-center gap-2 transition-colors">
                    <i data-feather="save" class="w-4 h-4"></i>
                    Gravar Fechamento no Banco
                </button>
            </div>
        </div>

    </main>

    <div id="meu-perfil-modal" class="modal hidden fixed inset-0 bg-gray-800 bg-opacity-60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-bold text-gray-800">Meus Dados</h3>
                <button onclick="fecharModalPerfil()" class="text-gray-400 hover:text-gray-600">
                    <i data-feather="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">E-mail</label>
                    <input type="email" id="perfil-email" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">CPF</label>
                    <input type="text" id="perfil-cpf" placeholder="Apenas números" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                </div>
                <div class="pt-2 border-t border-gray-100">
                    <label class="block text-sm font-semibold text-gray-700">Nova Senha</label>
                    <input type="password" id="perfil-senha" placeholder="Deixe em branco para não alterar" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="fecharModalPerfil()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 shadow-sm">Cancelar</button>
                <button onclick="salvarMeuPerfil()" class="px-4 py-2 text-sm font-bold text-white bg-indigo-600 rounded-md hover:bg-indigo-700 shadow-sm">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <script src="assets/global.js"></script>
    <script src="conciliacao.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof feather !== 'undefined') feather.replace();
            
            // Popula o nome do usuário na barra superior ao carregar a página usando o global.js
            const userData = getUserData();
            if (userData && document.getElementById('user-name')) {
                document.getElementById('user-name').textContent = userData.nome || 'Utilizador';
            }
        });
    </script>
</body>
</html>
